name: tim CI

on:
  push:
    branches: [main]
    paths:
      - 'tim/**'
      - '.github/workflows/tim-ci.yml'
  pull_request:
    paths:
      - 'tim/**'
      - '.github/workflows/tim-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tim
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # tim's baseline is Node >= 24 (tim/CLAUDE.md). npm 10 (Node 22)
          # also rejects the lockfile: it auto-installs the @emnapi/* peers
          # of the optional @napi-rs/wasm-runtime and finds no top-level
          # lockfile entries for them; npm 11 accepts it.
          node-version: 24
          cache: npm
          cache-dependency-path: tim/package-lock.json

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm test
        env:
          CI: 'true'
