name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        description: 'Branch name to probe for service images'
        required: true
        type: string
    outputs:
      report-url:
        description: 'URL to the deployed Playwright HTML report'
        value: ${{ jobs.deploy-report.outputs.report-url }}
      lighthouse-result:
        description: 'Result of the Lighthouse CI job (success, failure, skipped)'
        value: ${{ jobs.lighthouse.result }}
      lighthouse-report-url:
        description: 'URL to the deployed Lighthouse HTML report'
        value: ${{ jobs.lighthouse.outputs.report-url }}

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: DEFRA/trade-imports-animals-workspace
          ref: main

      - name: Resolve branch tag
        id: branch-tag
        run: |
          raw="${{ inputs.branch || github.head_ref || github.ref_name }}"
          tag="${raw//\//-}"
          tag="$(printf '%s' "$tag" | tr -cd 'a-zA-Z0-9_.-')"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          while [[ "$tag" == [.-]* ]]; do tag="${tag:1}"; done
          tag="${tag:0:128}"
          echo "sanitised=$tag" >> "$GITHUB_OUTPUT"

          if docker manifest inspect "defradigital/trade-imports-animals-tests:${tag}" >/dev/null 2>&1; then
            echo "tests-tag=$tag" >> "$GITHUB_OUTPUT"
            echo "Tests image: branch ($tag)"
          else
            echo "tests-tag=latest" >> "$GITHUB_OUTPUT"
            echo "Tests image: latest (no branch tag)"
          fi

      - name: Start stack
        run: ./scripts/stack/run-stack.sh --branch "${{ inputs.branch || github.head_ref || github.ref_name }}"

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          docker run --rm \
            --network host \
            --user root \
            -v ${{ github.workspace }}/artifacts/blob-report:/app/blob-report \
            -v ${{ github.workspace }}/artifacts/test-results:/app/test-results \
            -v ${{ github.workspace }}/artifacts/allure-results:/app/allure-results \
            --entrypoint npx \
            defradigital/trade-imports-animals-tests:${{ steps.branch-tag.outputs.tests-tag }} \
            playwright test \
              --config=playwright.local.fast.config.ts \
              --grep-invert "@agent|@a11y" \
              --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
              --reporter=blob,list,allure-playwright

      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shardIndex }}
          path: |
            artifacts/blob-report/
            artifacts/test-results/
            artifacts/allure-results/
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose -p trade-imports-animals down

  merge-reports:
    if: always() && needs.e2e.result != 'skipped'
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          path: all-shards/

      - name: Merge Playwright reports
        run: |
          npm install -D @playwright/test
          mkdir -p all-blob-reports
          find all-shards -path '*/blob-report/*' -exec cp {} all-blob-reports/ \;
          npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Combine allure and test results
        run: |
          mkdir -p combined-allure-results combined-test-results
          for dir in all-shards/*/artifacts/allure-results; do
            [ -d "$dir" ] && cp -r "$dir"/* combined-allure-results/ 2>/dev/null || true
          done
          for dir in all-shards/*/artifacts/test-results; do
            [ -d "$dir" ] && cp -r "$dir"/* combined-test-results/ 2>/dev/null || true
          done

      - name: Upload merged reports
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            playwright-report/
            combined-allure-results/
            combined-test-results/
          retention-days: 14

  deploy-report:
    needs: [e2e, merge-reports]
    if: always() && needs.merge-reports.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pages-${{ github.repository }}
      cancel-in-progress: false
    outputs:
      report-url: ${{ steps.url.outputs.report-url }}
    steps:
      - name: Download merged report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: report/

      - name: Resolve branch tag
        id: branch-tag
        run: |
          raw="${{ inputs.branch || github.head_ref || github.ref_name }}"
          tag="${raw//\//-}"
          tag="$(printf '%s' "$tag" | tr -cd 'a-zA-Z0-9_.-')"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          while [[ "$tag" == [.-]* ]]; do tag="${tag:1}"; done
          tag="${tag:0:128}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report/playwright-report
          destination_dir: e2e/${{ steps.branch-tag.outputs.tag }}
          keep_files: true

      - name: Output report URL
        id: url
        run: |
          repo="${{ github.repository }}"
          owner="${repo%%/*}"
          name="${repo##*/}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          echo "report-url=https://${owner_lc}.github.io/${name}/e2e/${{ steps.branch-tag.outputs.tag }}/" >> "$GITHUB_OUTPUT"

  lighthouse:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: pages-${{ github.repository }}-lighthouse
      cancel-in-progress: false
    outputs:
      report-url: ${{ steps.report-url.outputs.url }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: DEFRA/trade-imports-animals-workspace
          ref: main

      - name: Resolve branch tag
        id: branch-tag
        run: |
          raw="${{ inputs.branch || github.head_ref || github.ref_name }}"
          tag="${raw//\//-}"
          tag="$(printf '%s' "$tag" | tr -cd 'a-zA-Z0-9_.-')"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          while [[ "$tag" == [.-]* ]]; do tag="${tag:1}"; done
          tag="${tag:0:128}"
          echo "sanitised=$tag" >> "$GITHUB_OUTPUT"

      - name: Start stack
        run: ./scripts/stack/run-stack.sh --branch "${{ inputs.branch || github.head_ref || github.ref_name }}"

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: DEFRA/trade-imports-animals-frontend
          ref: ${{ inputs.branch || github.head_ref || github.ref_name }}
          path: frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Lighthouse CI
        id: lhci
        run: npx lhci autorun
        working-directory: frontend

      - name: Generate report index
        if: always() && steps.lhci.outcome != 'skipped'
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const manifest = JSON.parse(fs.readFileSync('./frontend/lighthouse-report/manifest.json', 'utf8'));
            const rows = manifest.filter(e => e.isRepresentativeRun).map(e => {
              const file = path.basename(e.htmlPath);
              const scores = Object.entries(e.summary)
                .map(([k, v]) => \`<td>\${Math.round(v * 100)}</td>\`)
                .join('');
              return \`<tr><td><a href=\"\${file}\">\${new URL(e.url).pathname}</a></td>\${scores}</tr>\`;
            }).join('');
            const html = \`<!DOCTYPE html>
            <html><head><title>Lighthouse Report</title>
            <style>body{font-family:sans-serif;margin:2rem}table{border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f5f5f5}</style>
            </head><body><h1>Lighthouse Reports</h1>
            <table><thead><tr><th>Page</th><th>Performance</th><th>Accessibility</th><th>Best Practices</th></tr></thead>
            <tbody>\${rows}</tbody></table></body></html>\`;
            fs.writeFileSync('./frontend/lighthouse-report/index.html', html);
          "

      - name: Upload Lighthouse report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: frontend/lighthouse-report/
          retention-days: 14

      - name: Deploy Lighthouse report to GitHub Pages
        if: always() && steps.lhci.outcome != 'skipped'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/lighthouse-report
          destination_dir: lighthouse/${{ steps.branch-tag.outputs.sanitised }}
          keep_files: true

      - name: Output report URL
        id: report-url
        if: always()
        run: |
          repo="${{ github.repository }}"
          owner="${repo%%/*}"
          name="${repo##*/}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          echo "url=https://${owner_lc}.github.io/${name}/lighthouse/${{ steps.branch-tag.outputs.sanitised }}/" >> "$GITHUB_OUTPUT"

      - name: Tear down stack
        if: always()
        run: docker compose -p trade-imports-animals down
