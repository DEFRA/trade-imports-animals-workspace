name: Cleanup E2E Reports

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'truncate to orphan-reset gh-pages history; empty for default stale cleanup'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      head-ref:
        description: 'PR head branch name. If provided, cleans up that branch report. If empty, runs stale cleanup.'
        required: false
        type: string
        default: ''
      mode:
        description: 'truncate to orphan-reset gh-pages history; empty for default behaviour'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  cleanup-branch:
    if: inputs.mode == '' && inputs.head-ref != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Resolve branch tag
        id: branch-tag
        env:
          HEAD_REF: ${{ inputs.head-ref }}
        run: |
          tag="${HEAD_REF//\//-}"
          tag="$(printf '%s' "$tag" | tr -cd 'a-zA-Z0-9_.-')"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          while [[ "$tag" == [.-]* ]]; do tag="${tag:1}"; done
          tag="${tag:0:128}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Remove branch reports
        run: |
          tag="${{ steps.branch-tag.outputs.tag }}"
          changed=false
          for parent in e2e lighthouse; do
            dir="${parent}/${tag}"
            if [ -d "$dir" ]; then
              rm -rf "$dir"
              changed=true
            fi
          done
          if [ "$changed" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup: remove e2e + lighthouse reports for ${tag}"
            git push
          fi

  cleanup-stale:
    if: inputs.mode == '' && inputs.head-ref == ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove reports older than 7 days
        run: |
          cutoff=$(date -d '7 days ago' +%s)
          changed=false
          for parent in e2e lighthouse; do
            for dir in "${parent}"/*/; do
              [ -d "$dir" ] || continue
              last_modified=$(git log -1 --format=%ct -- "$dir")
              if [ -n "$last_modified" ] && [ "$last_modified" -lt "$cutoff" ]; then
                echo "Removing stale report: $dir"
                rm -rf "$dir"
                changed=true
              fi
            done
          done
          if [ "$changed" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup: remove stale e2e + lighthouse reports older than 7 days"
            git push
          fi

  truncate-history:
    if: inputs.mode == 'truncate'
    runs-on: ubuntu-latest
    concurrency:
      group: pages-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Orphan-reset gh-pages
        run: |
          git checkout --orphan _orphan
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: orphan-reset gh-pages (history truncated; see EUDPA-199)"
          git branch -D gh-pages
          git branch -m gh-pages
          git push -f origin gh-pages
