name: Cleanup E2E Reports

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      head-ref:
        description: 'PR head branch name. If set (e.g. on pull_request: closed) the matching tag is force-removed from the keep-list so the closed PR''s preview is pruned even if the gh API has not yet reflected the closure.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: read

jobs:
  prune-and-truncate:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Prune subdirs not matching an active preview
        env:
          HEAD_REF: ${{ inputs.head-ref }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          sanitise() {
            local raw="$1"
            local tag="${raw//\//-}"
            tag="$(printf '%s' "$tag" | tr -cd 'a-zA-Z0-9_.-')"
            tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
            while [[ "$tag" == [.-]* ]]; do tag="${tag:1}"; done
            tag="${tag:0:128}"
            printf '%s' "$tag"
          }

          # Build the keep-list:
          #   - always keep "main"
          #   - keep any open PR whose updated_at falls within the activity window
          cutoff=$(date -u -d '21 days ago' +"%Y-%m-%dT%H:%M:%SZ")
          keep_list=$(mktemp)
          echo "main" > "$keep_list"
          gh api "repos/${REPO}/pulls?state=open&per_page=100" --paginate \
            --jq ".[] | select(.updated_at >= \"$cutoff\") | .head.ref" \
            | while IFS= read -r ref; do
                [ -n "$ref" ] && { sanitise "$ref"; printf '\n'; }
              done >> "$keep_list"

          # Defensive: if the trigger supplied a head-ref (PR just closed),
          # force-remove that sanitised tag from the keep-list.
          if [ -n "$HEAD_REF" ]; then
            closed_tag=$(sanitise "$HEAD_REF")
            grep -vx "$closed_tag" "$keep_list" > "${keep_list}.tmp" || true
            mv "${keep_list}.tmp" "$keep_list"
          fi

          echo "Keep-list (sanitised tags):"
          sort -u "$keep_list"

          # Prune any subdir not in the keep-list
          changed=false
          for parent in e2e lighthouse; do
            [ -d "$parent" ] || continue
            for dir in "${parent}"/*/; do
              [ -d "$dir" ] || continue
              tag=$(basename "$dir")
              if ! grep -qx "$tag" "$keep_list"; then
                echo "Pruning $dir"
                rm -rf "$dir"
                changed=true
              fi
            done
          done

          if [ "$changed" = false ]; then
            echo "No subdirs to prune"
          fi

      - name: Orphan-reset gh-pages
        run: |
          git checkout --orphan _orphan
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: prune + orphan-reset gh-pages (EUDPA-199)" --allow-empty
          git branch -D gh-pages
          git branch -m gh-pages
          git push -f origin gh-pages
