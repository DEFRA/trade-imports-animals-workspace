name: Report E2E Status
description: Creates or updates a GitHub check run and PR comment with E2E test status

inputs:
  e2e-result:
    description: 'The E2E job result (pending, success, failure, skipped)'
    required: true
  report-url:
    description: 'URL to the deployed Playwright HTML report (may be empty)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Create or update check run on PR
      uses: actions/github-script@v7
      with:
        script: |
          const e2eResult = '${{ inputs.e2e-result }}';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const reportUrl = '${{ inputs.report-url }}';
          const prs = context.payload.workflow_run.pull_requests;
          const checkName = 'E2E Tests';

          if (e2eResult === 'pending') {
            for (const pr of prs) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: pr.head.sha,
                name: checkName,
                status: 'in_progress',
                details_url: runUrl,
                output: {
                  title: 'Workspace E2E: in progress',
                  summary: `[View workflow run](${runUrl})`
                }
              });
            }
          } else {
            const conclusion = e2eResult === 'success' ? 'success'
                             : e2eResult === 'skipped' ? 'skipped'
                             : 'failure';
            const summary = reportUrl
              ? `[View Playwright report](${reportUrl}) | [View workflow run](${runUrl})`
              : `[View workflow run](${runUrl})`;

            for (const pr of prs) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                check_name: checkName,
                filter: 'latest'
              });
              const pending = check_runs.find(c => c.status === 'in_progress');
              if (pending) {
                await github.rest.checks.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  check_run_id: pending.id,
                  status: 'completed',
                  conclusion,
                  details_url: reportUrl || runUrl,
                  output: {
                    title: `Workspace E2E: ${e2eResult}`,
                    summary
                  }
                });
              } else {
                await github.rest.checks.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head_sha: pr.head.sha,
                  name: checkName,
                  status: 'completed',
                  conclusion,
                  details_url: reportUrl || runUrl,
                  output: {
                    title: `Workspace E2E: ${e2eResult}`,
                    summary
                  }
                });
              }
            }
          }

    - name: Post or update PR comment
      uses: actions/github-script@v7
      with:
        script: |
          const e2eResult = '${{ inputs.e2e-result }}';
          const reportUrl = '${{ inputs.report-url }}';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const marker = '<!-- e2e-status -->';
          const icons = { pending: '⏳', success: '✅', skipped: '⏭️' };
          const icon = icons[e2eResult] || '❌';
          const status = e2eResult === 'pending' ? 'in progress' : e2eResult;

          const body = [
            marker,
            `### ${icon} Workspace E2E Tests: ${status}`,
            '',
            reportUrl ? `📊 [Playwright Report](${reportUrl})` : '',
            `🔗 [Workflow Run](${runUrl})`,
          ].filter(Boolean).join('\n');

          const prs = context.payload.workflow_run.pull_requests;
          for (const pr of prs) {
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
          }
