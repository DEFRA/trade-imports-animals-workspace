# Reproduces the CDP platform nginx-upstreams sidecar in front of the frontend pod.
# Mirrors DEFRA/cdp-nginx-upstreams server.conf.tpl: a 10M default cap on / and a
# 2304M bypass on /upload-and-scan proxying direct to cdp-uploader. Used by
# EUDPA-106 spike to prove the >10 MB upload path locally.

server {
    listen 3000;

    client_max_body_size 10M;

    location /upload-and-scan {
        client_max_body_size 2304M;
        proxy_pass http://cdp-uploader:7337;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://trade-imports-animals-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
