services:
  trade-imports-animals-admin:
    profiles: [frontend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./shared.env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - SESSION_CACHE_ENGINE=redis
      - TRADE_IMPORTS_ANIMALS_BACKEND_URL=http://host.docker.internal:8085
      - TRADE_IMPORTS_DYNAMICS_GATEWAY_URL=http://host.docker.internal:8088
      - DEFRA_ID_OIDC_CONFIGURATION_URL=http://host.docker.internal:3007/idphub/b2c/b2c_1a_cui_cpdev_signupsigninsfi/.well-known/openid-configuration
      - DEFRA_ID_REDIRECT_URL=http://localhost:3001/auth/sign-in-oidc
      - DEFRA_ID_SIGN_OUT_REDIRECT_URL=http://localhost:3001/auth/sign-out-oidc
      - DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_ENABLED=true
    healthcheck:
      interval: 3s
      retries: 3
      start_period: 2s
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3001/health
    image: defradigital/trade-imports-animals-admin:${TRADE_IMPORTS_ANIMALS_ADMIN:-latest}
    platform: linux/amd64
    ports:
      - '3001:3001'
  trade-imports-animals-frontend:
    profiles: [frontend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cdp-uploader:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ./shared.env
    environment:
      - PORT=3000
      - NODE_ENV=development
      - SESSION_CACHE_ENGINE=redis
      - TRADE_IMPORTS_ANIMALS_BACKEND_URL=http://host.docker.internal:8085
      - TRADE_IMPORTS_REFERENCE_DATA_URL=http://host.docker.internal:8086
      # EUDPA-106: server-side /initiate calls go direct to cdp-uploader via
      # the docker network; the browser-side byte upload still goes through
      # the sidecar's /upload-and-scan bypass.
      - CDP_UPLOADER_BASE_URL=http://cdp-uploader:7337
      - DEFRA_ID_OIDC_CONFIGURATION_URL=http://host.docker.internal:3007/idphub/b2c/b2c_1a_cui_cpdev_signupsigninsfi/.well-known/openid-configuration
      - DEFRA_ID_REDIRECT_URL=http://localhost:3000/auth/sign-in-oidc
      - DEFRA_ID_SIGN_OUT_REDIRECT_URL=http://localhost:3000/auth/sign-out-oidc
      - DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_ENABLED=true
    healthcheck:
      interval: 3s
      retries: 3
      start_period: 2s
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/health
    image: defradigital/trade-imports-animals-frontend:${TRADE_IMPORTS_ANIMALS_FRONTEND:-latest}
    platform: linux/amd64
  # EUDPA-106: reproduces the CDP platform nginx-upstreams sidecar in front of
  # the frontend pod so >10 MB uploads via the old path fail with a real nginx
  # 413 locally, and the /upload-and-scan bypass is available for the new path.
  cdp-nginx-frontend:
    profiles: [frontend]
    image: nginx:alpine
    depends_on:
      trade-imports-animals-frontend:
        condition: service_healthy
      cdp-uploader:
        condition: service_started
    ports:
      - '3000:3000'
    volumes:
      - ./config/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
