services:
  trade-imports-animals-backend:
    profiles: [backend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    env_file:
      - ./shared.env
    environment:
      - PORT=8085
      - SPRING_PROFILES_ACTIVE=local
      - AWS_EMF_AGENT_ENDPOINT=http://host.docker.internal:4566
      - APP_AWS_ENDPOINT_OVERRIDE=http://host.docker.internal:4566
      - CDP_UPLOADER_BASE_URL=http://host.docker.internal:7337
      - TRADE_IMPORTS_ANIMALS_BACKEND_BASE_URL=http://host.docker.internal:8085
      - CDP_DOCUMENTS_BUCKET=trade-imports-animals-documents
      - OUTBOX_SNS_TOPIC_ARN=${OUTBOX_SNS_TOPIC_ARN:-arn:aws:sns:eu-west-2:000000000000:trade_imports_animals_eu_notifications.fifo}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 60s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8085/health
    image: defradigital/trade-imports-animals-backend:${TRADE_IMPORTS_ANIMALS_BACKEND:-latest}
    platform: linux/amd64
    ports:
      - '8085:8085'
  trade-imports-dynamics-gateway:
    profiles: [backend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      toxiproxy:
        condition: service_healthy
        required: false
    env_file:
      - ./shared.env
    environment:
      - PORT=8088
      - SPRING_PROFILES_ACTIVE=local
      - AWS_EMF_AGENT_ENDPOINT=http://host.docker.internal:4566
      - APP_AWS_ENDPOINT_OVERRIDE=http://host.docker.internal:4566
      - TRADE_IMPORTS_DYNAMICS_GATEWAY_BASE_URL=http://host.docker.internal:8088
      - NOTIFICATION_SQS_QUEUE_URL=${NOTIFICATION_SQS_QUEUE_URL:-http://host.docker.internal:4566/000000000000/trade_imports_animals_eu_notifications_gateway.fifo}
      - NOTIFICATION_SQS_ARN=${NOTIFICATION_SQS_ARN:-arn:aws:sqs:eu-west-2:000000000000:trade_imports_animals_eu_notifications_gateway.fifo}
      - NOTIFICATION_SQS_DLQ_URL=${NOTIFICATION_SQS_DLQ_URL:-http://host.docker.internal:4566/000000000000/trade_imports_animals_eu_notifications_gateway-deadletter.fifo}
      - NOTIFICATION_SQS_DLQ_ARN=${NOTIFICATION_SQS_DLQ_ARN:-arn:aws:sqs:eu-west-2:000000000000:trade_imports_animals_eu_notifications_gateway-deadletter.fifo}
      - AZURE_SERVICE_BUS_CONNECTION_STRING=${AZURE_SERVICE_BUS_CONNECTION_STRING:-Endpoint=sb://toxiproxy;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;EntityPath=local-queue}
      - AZURE_SERVICE_BUS_QUEUE
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 60s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8088/health
    image: defradigital/trade-imports-dynamics-gateway:${TRADE_IMPORTS_DYNAMICS_GATEWAY:-latest}
    platform: linux/amd64
    ports:
      - '8088:8088'
  trade-imports-reference-data:
    profiles: [backend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./shared.env
    environment:
      - PORT=8086
      - SPRING_PROFILES_ACTIVE=local
      - MONGO_DATABASE=trade-imports-reference-data
      - AWS_EMF_AGENT_ENDPOINT=http://host.docker.internal:4566
      - MDM_SERVICE_URL=http://host.docker.internal:8087
      - TRADE_PLATFORM_AUTH_URL=http://host.docker.internal:8087/tenant/oauth2/v2.0/token
      - TRADE_PLATFORM_CLIENT_ID=local-dev
      - TRADE_PLATFORM_CLIENT_SECRET=local-dev
      - TRADE_PLATFORM_SCOPE=local
      - TRADE_PLATFORM_SUBSCRIPTION_KEY=local-dev
      - LOG_LEVEL=INFO
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 30s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8086/health
    image: defradigital/trade-imports-reference-data:${TRADE_IMPORTS_REFERENCE_DATA:-latest}
    platform: linux/amd64
    ports:
      - '8086:8086'
