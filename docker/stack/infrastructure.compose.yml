services:
  cdp-uploader:
    profiles: [infrastructure]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_REGION: eu-west-2
      AWS_SECRET_ACCESS_KEY: test
      CONSUMER_BUCKETS: cdp-uploader-quarantine,trade-imports-animals-documents
      MOCK_VIRUS_RESULT_DELAY: 3
      MOCK_VIRUS_SCAN_ENABLED: 'true'
      NODE_ENV: development
      PORT: 7337
      REDIS_HOST: host.docker.internal
      S3_ENDPOINT: http://host.docker.internal:4566
      SQS_ENDPOINT: http://host.docker.internal:4566
      SQS_SCAN_RESULTS_CALLBACK: http://host.docker.internal:4566/000000000000/cdp-uploader-scan-results-callback.fifo
      USE_SINGLE_INSTANCE_CACHE: 'true'
    image: defradigital/cdp-uploader:latest
    platform: linux/amd64
    ports:
      - '7337:7337'
  floci:
    profiles: [infrastructure]
    env_file:
      - ./shared.env
    environment:
      - FLOCI_HOSTNAME=floci
    # See https://floci.io/floci/getting-started/migrate-from-localstack/#5-health-and-status-endpoints
    # Floci's own /_floci/ namespace mirrors the LocalStack /_localstack/ paths
    # (health, init, info all work the same way).
    # The use of the floci path seems more natural
    healthcheck:
      interval: 5s
      retries: 6
      start_period: 10s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:4566/_floci/health
    # tracked: AC pins to floci/floci:latest — pin to a digest or semver tag once floci publishes stable releases
    image: floci/floci:latest
    ports:
      - '4566:4566'
  floci-init:
    profiles: [infrastructure]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      floci:
        condition: service_healthy
    entrypoint: ['bash', '-c', 'for f in /scripts/*.sh; do echo "Running $$f"; bash "$$f"; done']
    env_file:
      - ./shared.env
    image: amazon/aws-cli
    volumes:
      - ./.staged/floci:/scripts
  mssql:
    profiles: [servicebus]
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'YourStrong@Passw0rd'
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" -b -No']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servicebus-emulator:
    profiles: [servicebus]
    # Pinned to match the dynamics-gateway Testcontainers integration tests
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:1.1.2
    platform: linux/amd64
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ACCEPT_EULA: 'Y'
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: 'YourStrong@Passw0rd'
    volumes:
      # Staged from the dynamics-gateway repo (the canonical ASB entity config)
      # by scripts/stack/lib/init-scripts.sh
      - ./.staged/servicebus/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - '5672:5672'


  redis:
    profiles: [infrastructure]
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 2s
      test:
        - CMD
        - redis-cli
        - PING
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
