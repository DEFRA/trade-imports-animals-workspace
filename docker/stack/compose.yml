# Workspace docker stack — base file. Anchors the compose project name so
# `docker compose -p trade-imports-animals ...` always lands on the same
# project regardless of which overlay subset is in play.
#
# Services live in the sibling overlay files:
#   - database.compose.yml          mongodb
#   - infrastructure.compose.yml    localstack, localstack-init, redis, cdp-uploader
#   - stubs.compose.yml             trade-imports-defra-id-stub, trade-imports-stub
#   - backend.compose.yml           trade-imports-animals-backend, trade-imports-reference-data
#   - frontend.compose.yml          trade-imports-animals-frontend, trade-imports-animals-admin
#   - dev.compose.yml (--dev only)  build:/target:/volumes overlay for the 5 repo-backed services
#
# scripts/stack/run-stack.sh -f-stacks all of these (plus dev.compose.yml when
# --dev is passed). See docker/stack/AGENTS.md.

name: trade-imports-animals
