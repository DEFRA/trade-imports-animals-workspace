# Workspace dev override.
# Routes all inter-service traffic via the host so any service can be swapped
# between Docker and a local process without reconfiguring anything.
#
# Usage (via Makefile):
#   make dev         — full stack in Docker
#   make dev-infra   — infra only, run services locally
#
# To work on a specific service:
#   1. make dev              (start everything)
#   2. docker stop trade-imports-animals-backend   (stop the one you want to change)
#   3. make start-backend    (run it locally — frontend/admin auto-connect)

services:

  # Redis and LocalStack have no ports exposed in the tests compose.
  # Expose them here so host.docker.internal can reach them.
  redis:
    ports:
      - 6379:6379

  localstack:
    ports:
      - 4566:4566

  trade-imports-defra-id-stub:
    environment:
      - WELL_KNOWN_HOST_OVERRIDE=http://localhost:3007

  trade-imports-animals-frontend:
    environment:
      - TRADE_IMPORTS_ANIMALS_BACKEND_URL=http://host.docker.internal:8085
      - REDIS_HOST=host.docker.internal
      - DEFRA_ID_OIDC_CONFIGURATION_URL=http://localhost:3007/idphub/b2c/b2c_1a_cui_cpdev_signupsigninsfi/.well-known/openid-configuration

  trade-imports-animals-admin:
    environment:
      - TRADE_IMPORTS_ANIMALS_BACKEND_URL=http://host.docker.internal:8085
      - REDIS_HOST=host.docker.internal
      - DEFRA_ID_OIDC_CONFIGURATION_URL=http://host.docker.internal:3007/idphub/b2c/b2c_1a_cui_cpdev_signupsigninsfi/.well-known/openid-configuration

  trade-imports-animals-backend:
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/?tls=false
      - Mongo__DatabaseUri=mongodb://host.docker.internal:27017/?tls=false
      - REDIS_HOST=host.docker.internal
      - LOCALSTACK_URL=http://host.docker.internal:4566
      - SNS_ENDPOINT=http://host.docker.internal:4566
      - SQS_ENDPOINT=http://host.docker.internal:4566
      - S3_ENDPOINT=http://host.docker.internal:4566
      - AWS_EMF_AGENT_ENDPOINT=http://host.docker.internal:4566
      - METRICS_ENABLED=false
