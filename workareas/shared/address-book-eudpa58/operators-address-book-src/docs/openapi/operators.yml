openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
tags:
- name: operators
  description: Address book, scoped to the caller's organisation
paths:
  /organisation/{orgId}/addresses/{operator-id}:
    get:
      tags:
      - operators
      summary: Fetch one address, including tombstones
      operationId: get-operator
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: Trade-Imports-Organisation-Id
        in: header
        required: true
        schema:
          type: string
      - name: operator-id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The address (deleted false or true)
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OperatorResponse'
        '404':
          description: Unknown id, or an id outside the caller's organisation scope
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    put:
      tags:
      - operators
      summary: Replace an address's mutable fields
      operationId: update-operator
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: Trade-Imports-Organisation-Id
        in: header
        required: true
        schema:
          type: string
      - name: operator-id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
        required: true
      responses:
        '200':
          description: Updated address with bumped modifiedAt
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OperatorResponse'
        '400':
          description: Validation error, or a missing org header
          content:
            application/problem+json:
              schema:
                type: string
                anyOf:
                - $ref: '#/components/schemas/ValidationProblem'
                - $ref: '#/components/schemas/Problem'
        '404':
          description: Unknown id, an id outside the caller's organisation scope, or a tombstone
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    delete:
      tags:
      - operators
      summary: Soft-delete an address (tombstone)
      operationId: delete-operator
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: Trade-Imports-Organisation-Id
        in: header
        required: true
        schema:
          type: string
      - name: operator-id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Soft-deleted (or already deleted — idempotent)
        '400':
          description: Missing org header
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Unknown id, or an id outside the caller's organisation scope
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /organisation/{orgId}/addresses:
    get:
      tags:
      - operators
      summary: List the caller's ACTIVE addresses (paginated)
      operationId: list-operators
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: Trade-Imports-Organisation-Id
        in: header
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      responses:
        '200':
          description: One page of the caller's ACTIVE addresses
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OperatorPageResponse'
        '400':
          description: An out-of-range or non-numeric page, or a missing org header
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      tags:
      - operators
      summary: Create an address in the caller's address book
      operationId: create-operator
      parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
      - name: Trade-Imports-Organisation-Id
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OperatorResponse'
        '400':
          description: Validation error, or a missing identity header
          content:
            application/problem+json:
              schema:
                type: string
                anyOf:
                - $ref: '#/components/schemas/ValidationProblem'
                - $ref: '#/components/schemas/Problem'
components:
  schemas:
    AddressRequest:
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 0
        addressLine1:
          type: string
          maxLength: 255
          minLength: 0
        addressLine2:
          type: string
          maxLength: 255
          minLength: 0
        townOrCity:
          type: string
          maxLength: 100
          minLength: 0
        county:
          type: string
          maxLength: 100
          minLength: 0
        postcode:
          type: string
          maxLength: 12
          minLength: 0
        countryCode:
          type: string
          minLength: 1
        phone:
          type: string
          maxLength: 20
          minLength: 0
        email:
          type: string
          maxLength: 254
          minLength: 0
        type:
          type: object
        role:
          type: object
      required:
      - addressLine1
      - countryCode
      - email
      - name
      - phone
      - postcode
      - townOrCity
    ValidationProblem:
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        traceId:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Problem:
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        traceId:
          type: string
    OperatorResponse:
      properties:
        id:
          type: string
        name:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        townOrCity:
          type: string
        county:
          type: string
        postcode:
          type: string
        countryCode:
          type: string
        phone:
          type: string
        email:
          type: string
        organisationId:
          type: string
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
    OperatorPageResponse:
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatorResponse'
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalItems:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
